<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦆 Rubber Duck Disco Inferno 🦆</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Fredoka:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    background: #0a0012;
    cursor: crosshair;
    font-family: 'Fredoka', sans-serif;
  }
  canvas { display: block; }

  #ui-overlay {
    position: fixed;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    z-index: 10;
    text-align: center;
    padding: 18px;
  }
  #title {
    font-family: 'Bungee Shade', cursive;
    font-size: clamp(22px, 5vw, 52px);
    background: linear-gradient(90deg, #ff0055, #ffcc00, #00ffcc, #ff00ff, #ff0055);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbow 3s linear infinite;
    text-shadow: none;
    filter: drop-shadow(0 0 12px rgba(255,0,85,0.5));
    letter-spacing: 2px;
  }
  @keyframes rainbow {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }
  #subtitle {
    color: rgba(255,255,255,0.6);
    font-size: clamp(11px, 2vw, 16px);
    margin-top: 4px;
    letter-spacing: 1px;
  }
  #duck-count {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffcc00;
    font-family: 'Bungee Shade', cursive;
    font-size: clamp(14px, 3vw, 24px);
    pointer-events: none;
    z-index: 10;
    filter: drop-shadow(0 0 8px rgba(255,204,0,0.6));
  }
  #panic-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10;
    pointer-events: all;
    background: linear-gradient(135deg, #ff0055, #ff6600);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 50px;
    font-family: 'Fredoka', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,0,85,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #panic-btn:hover {
    transform: scale(1.1) rotate(-3deg);
    box-shadow: 0 6px 30px rgba(255,0,85,0.7);
  }
  #vibe-label {
    position: fixed;
    bottom: 60px;
    right: 20px;
    z-index: 10;
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    pointer-events: none;
    text-align: center;
  }

  .quack-popup {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 32px;
    animation: quackFloat 1.2s ease-out forwards;
  }
  @keyframes quackFloat {
    0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    50% { opacity: 1; transform: translateY(-60px) scale(1.3) rotate(15deg); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.5) rotate(-20deg); }
  }
</style>
</head>
<body>

<div id="ui-overlay">
  <div id="title">PANIC AT THE DUCK-SCO</div>
  <div id="subtitle">click anywhere to summon ducks · they live for the groove</div>
</div>
<div id="duck-count">🦆 × 0</div>
<button id="panic-btn">🚨 DUCK PANIC</button>
<div id="vibe-label">↑ chaos mode</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
//  🦆 RUBBER DUCK DISCO INFERNO 🦆
//  The ducks demand rhythm. The ducks demand respect.
// ============================================================

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0012, 0.012);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 18, 28);
camera.lookAt(0, 2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ---- DISCO FLOOR ----
const floorSize = 40;
const tileCount = 20;
const floorGroup = new THREE.Group();
const tileMeshes = [];

for (let x = 0; x < tileCount; x++) {
  for (let z = 0; z < tileCount; z++) {
    const geo = new THREE.BoxGeometry(floorSize/tileCount * 0.95, 0.3, floorSize/tileCount * 0.95);
    const mat = new THREE.MeshStandardMaterial({
      color: 0x111111,
      metalness: 0.8,
      roughness: 0.2,
      emissive: 0x000000,
    });
    const tile = new THREE.Mesh(geo, mat);
    tile.position.set(
      (x - tileCount/2 + 0.5) * (floorSize/tileCount),
      -0.15,
      (z - tileCount/2 + 0.5) * (floorSize/tileCount)
    );
    tile.receiveShadow = true;
    tile.userData = { gx: x, gz: z };
    floorGroup.add(tile);
    tileMeshes.push(tile);
  }
}
scene.add(floorGroup);

// ---- DISCO BALL (THE GLORIOUS ONE) ----
const discoBallGroup = new THREE.Group();
discoBallGroup.position.set(0, 16, 0);

// Core sphere (dark base)
const discoBallGeo = new THREE.SphereGeometry(2.8, 48, 48);
const discoBallMat = new THREE.MeshStandardMaterial({
  color: 0x222222,
  metalness: 0.9,
  roughness: 0.3,
});
const discoBall = new THREE.Mesh(discoBallGeo, discoBallMat);
discoBallGroup.add(discoBall);

// Gridded mirror facets — proper rows and columns on the sphere
const ballRadius = 2.88;
const rows = 22;
for (let row = 1; row < rows; row++) {
  const phi = (row / rows) * Math.PI;
  const y = Math.cos(phi) * ballRadius;
  const ringRadius = Math.sin(phi) * ballRadius;
  const circumference = 2 * Math.PI * ringRadius;
  const cols = Math.max(6, Math.floor(circumference / 0.42));
  for (let col = 0; col < cols; col++) {
    const theta = (col / cols) * Math.PI * 2;
    const facetW = (circumference / cols) * 0.88;
    const facetH = (Math.PI * ballRadius / rows) * 0.85;
    const facetGeo = new THREE.PlaneGeometry(facetW, facetH);
    const tint = (row + col) % 3;
    const colors = [0xffffff, 0xddeeff, 0xeeeeff];
    const facetMat = new THREE.MeshStandardMaterial({
      color: colors[tint],
      metalness: 1.0,
      roughness: 0.02,
      emissive: colors[tint],
      emissiveIntensity: 0.08,
    });
    const facet = new THREE.Mesh(facetGeo, facetMat);
    facet.position.set(
      ringRadius * Math.cos(theta),
      y,
      ringRadius * Math.sin(theta)
    );
    facet.lookAt(0, 0, 0);
    facet.rotation.y += Math.PI;
    discoBallGroup.add(facet);
  }
}

// Glint cap on top
const capGeo = new THREE.SphereGeometry(0.5, 12, 6, 0, Math.PI*2, 0, 0.5);
const capMat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 1, roughness: 0, emissive: 0x444444 });
const cap = new THREE.Mesh(capGeo, capMat);
cap.position.y = 2.6;
discoBallGroup.add(cap);

scene.add(discoBallGroup);

// Disco ball string
const stringGeo = new THREE.CylinderGeometry(0.06, 0.06, 8, 6);
const stringMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.2 });
const string = new THREE.Mesh(stringGeo, stringMat);
string.position.set(0, 20, 0);
scene.add(string);

// ---- LIGHT BEAMS radiating from disco ball ----
const beamCount = 12;
const beams = [];
const beamColors = [0xff0055, 0x00ffcc, 0xffcc00, 0xff00ff, 0x0088ff, 0xff6600,
                    0xff3399, 0x44ff88, 0xffaa00, 0x00aaff, 0xff2266, 0xaaff00];
for (let i = 0; i < beamCount; i++) {
  const beamGeo = new THREE.CylinderGeometry(0.03, 0.15, 18, 6);
  const beamMat = new THREE.MeshBasicMaterial({
    color: beamColors[i % beamColors.length],
    transparent: true,
    opacity: 0.25,
  });
  const beam = new THREE.Mesh(beamGeo, beamMat);
  beam.position.set(0, 16, 0);
  const angle = (i / beamCount) * Math.PI * 2;
  beam.rotation.z = Math.PI / 4 + (Math.random() - 0.5) * 0.3;
  beam.rotation.y = angle;
  beam.userData.baseAngle = angle;
  beam.userData.tilt = beam.rotation.z;
  beam.userData.colorIndex = i % beamColors.length;
  scene.add(beam);
  beams.push(beam);
}

// Sparkle particles orbiting the ball
const sparkleCount = 60;
const sparkleGeo = new THREE.BufferGeometry();
const sparklePositions = new Float32Array(sparkleCount * 3);
for (let i = 0; i < sparkleCount; i++) {
  const phi = Math.acos(2 * Math.random() - 1);
  const theta = Math.random() * Math.PI * 2;
  const r = 3.5 + Math.random() * 2;
  sparklePositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
  sparklePositions[i*3+1] = r * Math.cos(phi) + 16;
  sparklePositions[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
}
sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePositions, 3));
const sparkleMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.3,
  transparent: true,
  opacity: 0.7,
  sizeAttenuation: true,
});
const sparkles = new THREE.Points(sparkleGeo, sparkleMat);
scene.add(sparkles);

// ---- LIGHTS ----
const ambientLight = new THREE.AmbientLight(0x1a0033, 0.4);
scene.add(ambientLight);

const discoLights = [];
const lightColors = [0xff0055, 0x00ffcc, 0xffcc00, 0xff00ff, 0x0088ff, 0xff6600];
for (let i = 0; i < 6; i++) {
  const angle = (i / 6) * Math.PI * 2;
  const light = new THREE.SpotLight(lightColors[i], 2, 40, Math.PI / 6, 0.5, 1);
  light.position.set(Math.cos(angle) * 12, 14, Math.sin(angle) * 12);
  light.target.position.set(0, 0, 0);
  light.castShadow = true;
  light.shadow.mapSize.width = 512;
  light.shadow.mapSize.height = 512;
  scene.add(light);
  scene.add(light.target);
  discoLights.push(light);
}

// Point light under disco ball
const discoPoint = new THREE.PointLight(0xffffff, 1.5, 35);
discoPoint.position.set(0, 14, 0);
scene.add(discoPoint);

// Extra light right at ball center for facet reflections
const ballCenterLight = new THREE.PointLight(0xffffff, 0.8, 10);
ballCenterLight.position.set(0, 16, 0);
scene.add(ballCenterLight);

// ---- DUCK CREATION ----
const ducks = [];
const HAT_COLORS = [0xff0055, 0x00ffcc, 0xffcc00, 0xff00ff, 0x0088ff, 0x44ff00, 0xff6600, 0xff3399];
const DUCK_YELLOWS = [0xffdd00, 0xffe033, 0xffc800, 0xffee44, 0xffd700];

function createDuck(x, z) {
  const group = new THREE.Group();
  const duckYellow = DUCK_YELLOWS[Math.floor(Math.random() * DUCK_YELLOWS.length)];
  const bodyMat = new THREE.MeshStandardMaterial({
    color: duckYellow,
    roughness: 0.35,
    metalness: 0.05,
  });

  // Body - a squat sphere
  const bodyGeo = new THREE.SphereGeometry(1, 24, 18);
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.scale.set(1, 0.8, 1.1);
  body.position.y = 1;
  body.castShadow = true;
  group.add(body);

  // Head
  const headGeo = new THREE.SphereGeometry(0.6, 20, 16);
  const head = new THREE.Mesh(headGeo, bodyMat);
  head.position.set(0, 2, 0.35);
  head.castShadow = true;
  group.add(head);

  // Beak (orange cone)
  const beakGeo = new THREE.ConeGeometry(0.2, 0.5, 8);
  const beakMat = new THREE.MeshStandardMaterial({ color: 0xff8800, roughness: 0.4 });
  const beak = new THREE.Mesh(beakGeo, beakMat);
  beak.rotation.x = -Math.PI / 2;
  beak.position.set(0, 1.95, 0.95);
  group.add(beak);

  // Googly eyes
  const eyeWhiteGeo = new THREE.SphereGeometry(0.18, 12, 12);
  const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 });
  const eyePupilGeo = new THREE.SphereGeometry(0.1, 10, 10);
  const eyePupilMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 });

  for (let side = -1; side <= 1; side += 2) {
    const eyeWhite = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
    eyeWhite.position.set(side * 0.25, 2.15, 0.75);
    group.add(eyeWhite);

    const eyePupil = new THREE.Mesh(eyePupilGeo, eyePupilMat);
    eyePupil.position.set(side * 0.25, 2.15, 0.88);
    group.add(eyePupil);
    // Store pupil reference for animation
    group.userData['pupil' + (side > 0 ? 'R' : 'L')] = eyePupil;
    group.userData['eyeCenter' + (side > 0 ? 'R' : 'L')] = eyeWhite.position.clone();
  }

  // Tiny party hat!
  const hatColor = HAT_COLORS[Math.floor(Math.random() * HAT_COLORS.length)];
  const hatGeo = new THREE.ConeGeometry(0.35, 0.7, 8);
  const hatMat = new THREE.MeshStandardMaterial({
    color: hatColor,
    roughness: 0.3,
    metalness: 0.3,
    emissive: new THREE.Color(hatColor).multiplyScalar(0.15),
  });
  const hat = new THREE.Mesh(hatGeo, hatMat);
  hat.position.set(0, 2.7, 0.3);
  hat.rotation.z = (Math.random() - 0.5) * 0.5;
  group.add(hat);

  // Pom pom on hat
  const pomGeo = new THREE.SphereGeometry(0.12, 8, 8);
  const pomMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6 });
  const pom = new THREE.Mesh(pomGeo, pomMat);
  pom.position.set(hat.position.x, hat.position.y + 0.35, hat.position.z);
  group.add(pom);

  // Tail feather (tiny)
  const tailGeo = new THREE.ConeGeometry(0.15, 0.3, 6);
  const tail = new THREE.Mesh(tailGeo, bodyMat);
  tail.position.set(0, 1.5, -1.0);
  tail.rotation.x = 0.4;
  group.add(tail);

  group.position.set(x, 0, z);

  // Dance properties
  group.userData.danceSpeed = 1.5 + Math.random() * 2;
  group.userData.danceStyle = Math.floor(Math.random() * 5);
  group.userData.dancePhase = Math.random() * Math.PI * 2;
  group.userData.bounceHeight = 0.3 + Math.random() * 0.7;
  group.userData.spinSpeed = (Math.random() - 0.5) * 4;
  group.userData.wobbleAmount = 0.1 + Math.random() * 0.3;
  group.userData.vx = (Math.random() - 0.5) * 0.04;
  group.userData.vz = (Math.random() - 0.5) * 0.04;
  group.userData.panicMode = false;
  group.userData.head = head;
  group.userData.body = body;

  scene.add(group);
  ducks.push(group);
  updateDuckCount();
  return group;
}

function updateDuckCount() {
  document.getElementById('duck-count').textContent = `🦆 × ${ducks.length}`;
}

// Spawn initial ducks
for (let i = 0; i < 8; i++) {
  createDuck(
    (Math.random() - 0.5) * 14,
    (Math.random() - 0.5) * 14
  );
}

// ---- INTERACTION ----
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const intersection = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, intersection);

  if (intersection) {
    const clampedX = Math.max(-16, Math.min(16, intersection.x));
    const clampedZ = Math.max(-16, Math.min(16, intersection.z));
    createDuck(clampedX, clampedZ);

    // Quack popup!
    const quack = document.createElement('div');
    quack.className = 'quack-popup';
    quack.textContent = ['QUACK!', '🦆', 'HONK!', 'quack~', '🪩', 'GROOVE!', 'WADDLE!'][Math.floor(Math.random() * 7)];
    quack.style.left = e.clientX + 'px';
    quack.style.top = e.clientY + 'px';
    document.body.appendChild(quack);
    setTimeout(() => quack.remove(), 1200);
  }
});

// Panic button
let panicMode = false;
document.getElementById('panic-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  panicMode = !panicMode;
  document.getElementById('panic-btn').textContent = panicMode ? '🕊️ CALM DOWN' : '🚨 DUCK PANIC';
  document.getElementById('vibe-label').textContent = panicMode ? '↑ zen mode' : '↑ chaos mode';
});

// ---- ANIMATION ----
const clock = new THREE.Clock();
let time = 0;

function animateDuck(duck, t) {
  const d = duck.userData;
  const phase = t * d.danceSpeed + d.dancePhase;
  const panic = panicMode ? 3.0 : 1.0;

  // Different dance styles
  switch (d.danceStyle) {
    case 0: // Bouncy boi
      duck.position.y = Math.abs(Math.sin(phase * panic)) * d.bounceHeight * panic;
      duck.rotation.y += d.spinSpeed * 0.02 * panic;
      duck.rotation.z = Math.sin(phase * 2) * d.wobbleAmount;
      break;
    case 1: // Side-to-side swagger
      duck.position.y = Math.abs(Math.sin(phase * 2 * panic)) * 0.3;
      duck.position.x += Math.sin(phase * panic) * 0.02;
      duck.rotation.z = Math.sin(phase * panic) * 0.3;
      duck.rotation.y += 0.005 * panic;
      break;
    case 2: // Headbanger
      duck.position.y = Math.abs(Math.sin(phase * 3 * panic)) * 0.2;
      if (d.head) d.head.rotation.x = Math.sin(phase * 3 * panic) * 0.5;
      duck.rotation.y += d.spinSpeed * 0.01;
      break;
    case 3: // Spinning top
      duck.rotation.y += 0.08 * panic;
      duck.position.y = (Math.sin(phase * panic) * 0.5 + 0.5) * d.bounceHeight * panic;
      duck.scale.setScalar(1 + Math.sin(phase * 2) * 0.05 * panic);
      break;
    case 4: // The Wiggle
      duck.position.y = Math.abs(Math.sin(phase * panic)) * 0.4;
      duck.rotation.x = Math.sin(phase * 2 * panic) * 0.15;
      duck.rotation.z = Math.cos(phase * 2.5 * panic) * 0.2;
      if (d.body) d.body.scale.x = 1 + Math.sin(phase * 4 * panic) * 0.08;
      break;
  }

  // Drift around
  duck.position.x += d.vx * panic;
  duck.position.z += d.vz * panic;

  // Bounce off walls
  if (Math.abs(duck.position.x) > 16) { d.vx *= -1; duck.position.x = Math.sign(duck.position.x) * 16; }
  if (Math.abs(duck.position.z) > 16) { d.vz *= -1; duck.position.z = Math.sign(duck.position.z) * 16; }

  // Occasionally change direction
  if (Math.random() < 0.002 * panic) {
    d.vx += (Math.random() - 0.5) * 0.02;
    d.vz += (Math.random() - 0.5) * 0.02;
    d.vx = Math.max(-0.08, Math.min(0.08, d.vx));
    d.vz = Math.max(-0.08, Math.min(0.08, d.vz));
  }

  // Googly eyes - pupils jiggle
  const jiggle = panicMode ? 0.08 : 0.04;
  ['pupilR', 'pupilL'].forEach(key => {
    const pupil = d[key];
    const center = d[key.replace('pupil', 'eyeCenter')];
    if (pupil && center) {
      pupil.position.x = center.x + Math.sin(t * 7 + d.dancePhase) * jiggle;
      pupil.position.y = center.y + Math.cos(t * 5 + d.dancePhase) * jiggle;
    }
  });
}

function animateFloor(t) {
  const speed = panicMode ? 4.0 : 1.5;
  tileMeshes.forEach(tile => {
    const { gx, gz } = tile.userData;
    const wave = Math.sin(gx * 0.8 + t * speed) * Math.cos(gz * 0.8 + t * speed * 0.7);
    const colorIndex = Math.floor((wave + 1) * 3) % 6;
    const intensity = (wave + 1) / 2;

    const color = new THREE.Color(lightColors[colorIndex]);
    tile.material.emissive.copy(color).multiplyScalar(intensity * (panicMode ? 0.6 : 0.3));

    // Floor tiles pulse up slightly
    tile.position.y = -0.15 + intensity * (panicMode ? 0.15 : 0.05);
  });
}

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  time += dt;

  // Rotate disco ball group
  discoBallGroup.rotation.y += (panicMode ? 0.06 : 0.015);
  // Gentle wobble
  discoBallGroup.rotation.x = Math.sin(time * 0.3) * 0.05;
  discoBallGroup.rotation.z = Math.cos(time * 0.25) * 0.05;

  // Animate light beams
  beams.forEach((beam, i) => {
    const speed = panicMode ? 3 : 1;
    beam.rotation.y = beam.userData.baseAngle + time * speed * 0.4;
    beam.rotation.z = beam.userData.tilt + Math.sin(time * speed * 0.7 + i) * 0.3;
    beam.material.opacity = 0.15 + Math.sin(time * speed * 2 + i * 1.5) * 0.15;
    if (panicMode) {
      const hue = ((time * 0.4 + i * 0.08) % 1);
      beam.material.color.setHSL(hue, 1, 0.5);
    } else {
      beam.material.color.setHex(beamColors[beam.userData.colorIndex]);
    }
  });

  // Animate sparkle particles
  const sPos = sparkles.geometry.attributes.position.array;
  for (let i = 0; i < sparkleCount; i++) {
    const baseX = sPos[i*3];
    const baseZ = sPos[i*3+2];
    const angle = time * (panicMode ? 1.5 : 0.4) + i * 0.5;
    const r = Math.sqrt(baseX*baseX + baseZ*baseZ);
    sPos[i*3] = Math.cos(angle + i) * r;
    sPos[i*3+2] = Math.sin(angle + i) * r;
  }
  sparkles.geometry.attributes.position.needsUpdate = true;
  sparkleMat.opacity = 0.4 + Math.sin(time * 3) * 0.3;

  // Animate disco lights
  discoLights.forEach((light, i) => {
    const speed = panicMode ? 3 : 1;
    const angle = (i / 6) * Math.PI * 2 + time * speed * 0.5;
    light.position.x = Math.cos(angle) * 12;
    light.position.z = Math.sin(angle) * 12;
    light.target.position.x = Math.sin(time * speed + i) * 6;
    light.target.position.z = Math.cos(time * speed + i * 1.3) * 6;
    light.intensity = 1.5 + Math.sin(time * speed * 3 + i * 2) * 1.0;

    // Color cycling in panic mode
    if (panicMode) {
      const hue = ((time * 0.3 + i * 0.15) % 1);
      light.color.setHSL(hue, 1, 0.5);
    } else {
      light.color.setHex(lightColors[i]);
    }
  });

  // Disco ball point light pulses
  discoPoint.intensity = 1.2 + Math.sin(time * (panicMode ? 8 : 3)) * 0.6;
  ballCenterLight.intensity = 0.5 + Math.sin(time * (panicMode ? 6 : 2)) * 0.4;
  if (panicMode) {
    discoPoint.color.setHSL((time * 0.5) % 1, 1, 0.6);
    ballCenterLight.color.setHSL((time * 0.7) % 1, 0.8, 0.7);
  }

  // Camera gentle sway
  const camSway = panicMode ? 2.5 : 0.8;
  camera.position.x = Math.sin(time * 0.2) * camSway;
  camera.position.z = 28 + Math.cos(time * 0.15) * camSway;
  camera.lookAt(0, 3, 0);

  // Animate ducks
  ducks.forEach(duck => animateDuck(duck, time));

  // Animate floor
  animateFloor(time);

  renderer.render(scene, camera);
}

animate();

// ---- RESIZE ----
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
